name: Auto-merge Claude PRs

# Human-in-the-loop gate: a Claude-authored PR is only merged + deployed AFTER a
# real person submits an approving review. The agent cannot satisfy this itself --
# GitHub forbids approving your own PR (the author is app/claude), and bot/app
# reviews are explicitly excluded below. Without this gate, public input could reach
# production through issue -> agent PR -> auto-merge with no human checkpoint.
on:
  workflow_run:
    workflows: [Claude Code Review]
    types: [completed]
  pull_request_review:
    types: [submitted]

concurrency:
  group: auto-merge
  cancel-in-progress: false

jobs:
  auto-merge:
    # Run when the review workflow finishes successfully, or whenever a review is
    # submitted (the human approval that actually unlocks the merge).
    if: >-
      github.event_name == 'pull_request_review' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: read
      actions: write
    steps:
      - name: Find PR
        id: find-pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_DATA: ${{ toJson(github.event.workflow_run.pull_requests) }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            # The approval/review event carries the PR directly.
            pr_number="${{ github.event.pull_request.number }}"
          else
            # workflow_run: try the pull_requests array, then fall back to head branch.
            pr_number=$(echo "$PR_DATA" | jq -r '.[0].number // empty')
            if [ -z "$pr_number" ]; then
              head_branch="${{ github.event.workflow_run.head_branch }}"
              echo "pull_requests array empty, searching by branch: $head_branch"
              pr_number=$(gh pr list --repo "${{ github.repository }}" \
                --head "$head_branch" \
                --state open \
                --json number \
                --jq '.[0].number // empty')
            fi
          fi

          if [ -z "$pr_number" ]; then
            echo "No open PR found for this event"
            exit 0
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Verify author, human approval, and checks -- then merge
        id: verify-and-merge
        if: steps.find-pr.outputs.pr_number
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.find-pr.outputs.pr_number }}
        run: |
          pr_info=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" \
            --json title,author,url)
          pr_title=$(echo "$pr_info" | jq -r '.title')
          pr_url=$(echo "$pr_info" | jq -r '.url')
          pr_author=$(echo "$pr_info" | jq -r '.author.login')

          echo "PR #$PR_NUMBER: $pr_title"
          echo "Author: $pr_author"
          echo "URL: $pr_url"

          # Only auto-merge agent-authored PRs.
          if [ "$pr_author" != "app/claude" ]; then
            echo "Skipping: author is '$pr_author', not 'app/claude'"
            exit 0
          fi

          # Require at least one APPROVED review from a real human. Reviews from bots
          # or GitHub Apps (claude[bot], github-actions[bot], the app/claude author)
          # do NOT count -- this is the human checkpoint before production.
          human_approvals=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            --paginate \
            --jq '[.[]
                    | select(.state == "APPROVED")
                    | select(.user.type != "Bot")
                    | select(.user.login | endswith("[bot]") | not)
                  ] | length')

          if [ "${human_approvals:-0}" -lt 1 ]; then
            echo "Holding: no human approval yet. A maintainer must approve this PR before it merges/deploys."
            exit 0
          fi
          echo "Human approvals: $human_approvals"

          # Verify all checks passed (exclude auto-merge's own check to avoid a race).
          failing=$(gh pr checks "$PR_NUMBER" --repo "${{ github.repository }}" \
            --json name,bucket --jq '[.[] | select(.bucket != "pass" and .name != "auto-merge")] | length')

          if [ "$failing" != "0" ]; then
            echo "Skipping: $failing check(s) not passing"
            gh pr checks "$PR_NUMBER" --repo "${{ github.repository }}" \
              --json name,bucket --jq '.[] | select(.bucket != "pass") | "\(.name): \(.bucket)"'
            exit 0
          fi

          echo "Author + human approval + checks all OK, merging..."
          if merge_output=$(gh pr merge "$PR_NUMBER" --repo "${{ github.repository }}" \
            --squash --delete-branch 2>&1); then
            echo "Merged PR #$PR_NUMBER: $pr_title"
            echo "merged=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Merge failed: $merge_output"
            exit 1
          fi

      - name: Close linked issues
        if: steps.verify-and-merge.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.find-pr.outputs.pr_number }}
        run: |
          # GITHUB_TOKEN merges don't auto-close linked issues, so close them explicitly
          issue_numbers=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" \
            --json closingIssuesReferences \
            --jq '.closingIssuesReferences[].number')

          for issue in $issue_numbers; do
            echo "Closing linked issue #$issue"
            gh issue close "$issue" --repo "${{ github.repository }}" \
              --reason completed \
              --comment "Closed by merge of #$PR_NUMBER"
          done

      - name: Trigger deploy
        if: steps.verify-and-merge.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # GITHUB_TOKEN merges don't trigger push events, so dispatch Deploy manually
          gh workflow run "Deploy to AWS" --repo "${{ github.repository }}" --ref main
          echo "Deploy workflow dispatched"
