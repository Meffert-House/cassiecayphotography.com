name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: read
      # No id-token: the review authenticates to Anthropic via CLAUDE_CODE_OAUTH_TOKEN
      # and must not be able to mint OIDC tokens (the AWS deploy role trusts the whole
      # repo). But claude-code-action ALSO needs a GitHub credential; without id-token
      # it can't do its OIDC-for-app-token exchange and every run died with "Unable to
      # get ACTIONS_ID_TOKEN_REQUEST_URL". Passing github_token below supplies the
      # GitHub credential explicitly so the action skips the OIDC exchange entirely.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@536f2c32a39763739000b0e1ac69ca2647d97ce9 # v1
        with:
          github_token: ${{ github.token }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot],dependabot[bot]"
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
